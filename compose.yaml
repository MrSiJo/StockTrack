services:
  stocktrack-api:
    build: ./backend
    env_file: .env
    volumes:
      - stocktrack-data:/data
    expose:
      - "9180"
    # The API has no authentication — publishing it on the host bypasses the
    # nginx proxy entirely. Uncomment only for local debugging.
    # ports:
    #   - "9180:9180"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9180/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  stocktrack-ui:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-9181}:80"
    depends_on:
      stocktrack-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  stocktrack-data:
